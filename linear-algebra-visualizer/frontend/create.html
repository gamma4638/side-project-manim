<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathViz — 강의 팩 만들기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0b0d11;
      --bg2:      #13161c;
      --bg3:      #1c2028;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.12);
      --text:     #e8eaf0;
      --muted:    #5a6170;
      --muted2:   #8b95a5;
      --green:    #4ade80;
      --radius:   12px;
      --mono:     'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header-divider {
      width: 1px;
      height: 18px;
      background: var(--border2);
      margin: 0 18px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted2);
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Noto Sans KR', sans-serif;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--text); }

    /* ── LAYOUT ──────────────────────────────────── */
    .page {
      min-height: calc(100vh - 52px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
    }

    /* ── STEPPER ─────────────────────────────────── */
    .stepper {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: 44px;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .step-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .step.done .step-icon {
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      color: var(--muted2);
    }

    .step.active .step-icon {
      background: var(--bg3);
      border: 2px solid rgba(255,255,255,0.5);
      color: var(--text);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.04);
    }

    .step.pending .step-icon {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      color: var(--muted);
    }

    .step-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .step-sublabel {
      font-size: 12px;
      color: var(--muted2);
      margin-top: -4px;
    }
    .step.active .step-label { color: var(--muted2); }
    .step.active .step-sublabel { color: var(--text); font-weight: 600; }

    .step-connector {
      width: 120px;
      height: 1.5px;
      background: var(--border2);
      margin-top: 22px;
      flex-shrink: 0;
    }
    .step-connector.done { background: rgba(255,255,255,0.2); }

    /* check icon inside done step */
    .check-icon {
      width: 16px;
      height: 16px;
    }

    /* ── CARD ────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 720px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* Step 1 and 2 — hidden by default, show when active */
    .step-panel { display: none; }
    .step-panel.active { display: block; }

    /* ── STEP 1: UPLOAD ──────────────────────────── */
    .upload-area {
      padding: 32px;
    }

    .upload-zone {
      border: 1.5px dashed var(--border2);
      border-radius: 10px;
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .upload-zone:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.02); }
    .upload-zone.dragover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.04); }

    .upload-icon { color: var(--muted2); }
    .upload-label { font-size: 15px; color: var(--muted2); }
    .upload-label strong { color: var(--text); }
    .upload-hint { font-size: 11px; color: var(--muted); font-family: var(--mono); }

    .input-group {
      margin-top: 24px;
    }
    .input-label { font-size: 12px; color: var(--muted2); margin-bottom: 7px; }
    .input-field {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-field::placeholder { color: var(--muted); }
    .input-field:focus { border-color: rgba(255,255,255,0.3); }

    .card-footer-row {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* ── STEP 2: CONCEPTS ────────────────────────── */
    .concepts-area { padding: 28px 32px; }
    .concepts-title { font-size: 13px; color: var(--muted2); margin-bottom: 16px; }

    .concept-list { display: flex; flex-direction: column; gap: 2px; }

    .concept-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .concept-item:hover { background: rgba(255,255,255,0.03); }

    .concept-check {
      width: 18px; height: 18px;
      border: 1.5px solid var(--border2);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .concept-item.checked .concept-check {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
    }
    .concept-name { font-size: 13px; flex: 1; }
    .concept-item:not(.checked) .concept-name { color: var(--muted2); }

    /* ── STEP 3: GENERATING ──────────────────────── */
    .generating-area { padding: 36px 32px 28px; }

    .gen-header { text-align: center; margin-bottom: 32px; }
    .gen-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .gen-sub {
      font-size: 13px;
      color: var(--muted2);
      font-family: var(--mono);
    }

    /* concept rows */
    .concept-rows { display: flex; flex-direction: column; }

    .concept-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 4px;
      border-bottom: 1px solid var(--border);
    }
    .concept-row:last-child { border-bottom: none; }

    /* state icons */
    .row-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .row-icon.done {
      background: rgba(255,255,255,0.1);
    }
    .row-icon.active {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.2);
    }
    .row-icon.active::after {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
    }
    .row-icon.pending {
      border: 1.5px solid var(--border2);
    }

    .row-name {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
    }
    .concept-row.done .row-name { color: var(--muted2); }
    .concept-row.active .row-name { color: var(--text); }
    .concept-row.pending .row-name { color: var(--muted); }

    .row-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      min-width: 140px;
    }

    .badge-done {
      padding: 3px 12px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      font-size: 12px;
      color: var(--muted2);
    }

    .status-active {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted2);
      font-family: var(--mono);
    }
    .active-dots {
      display: flex;
      gap: 3px;
    }
    .active-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted2);
      animation: dotBlink 1.2s infinite;
    }
    .active-dots span:nth-child(2) { animation-delay: 0.2s; }
    .active-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBlink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.7); }
      40%            { opacity: 1;   transform: scale(1); }
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: rgba(255,255,255,0.55);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .progress-pct {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
    }

    .row-active-content {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .status-pending {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* CTA */
    .gen-cta {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 15px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border2);
      border-radius: 9px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: not-allowed;
      transition: all 0.15s;
    }
    .btn-primary.ready {
      background: var(--text);
      color: var(--bg);
      cursor: pointer;
      border-color: transparent;
    }
    .btn-primary.ready:hover { opacity: 0.9; }

    .cta-hint {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── SHARED BUTTONS ──────────────────────────── */
    .btn {
      padding: 9px 20px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted2);
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
    .btn-white {
      background: var(--text);
      color: var(--bg);
    }
    .btn-white:hover { opacity: 0.9; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <span class="logo">∑ MathViz</span>
  <div class="header-divider"></div>
  <button class="back-btn" onclick="history.back()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    뒤로
  </button>
</header>

<div class="page">

  <!-- STEPPER -->
  <div class="stepper" id="stepper">
    <div class="step" id="step1">
      <div class="step-icon">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="text-align:center">
        <div class="step-label">STEP 1</div>
        <div class="step-sublabel">업로드</div>
      </div>
    </div>

    <div class="step-connector"></div>

    <div class="step" id="step2">
      <div class="step-icon">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="text-align:center">
        <div class="step-label">STEP 2</div>
        <div class="step-sublabel">개념 확인</div>
      </div>
    </div>

    <div class="step-connector"></div>

    <div class="step" id="step3">
      <div class="step-icon">3</div>
      <div style="text-align:center">
        <div class="step-label">STEP 3</div>
        <div class="step-sublabel">영상 생성</div>
      </div>
    </div>
  </div>

  <!-- ── CARD ─────────────────────────────────── -->
  <div class="card">

    <!-- STEP 1: UPLOAD -->
    <div class="step-panel" id="panel1">
      <div class="upload-area">
        <div class="upload-zone" id="dropZone"
          ondragover="event.preventDefault();this.classList.add('dragover')"
          ondragleave="this.classList.remove('dragover')"
          ondrop="handleDrop(event)"
          onclick="document.getElementById('fileInput').click()"
        >
          <div class="upload-icon">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
          </div>
          <div class="upload-label"><strong>PDF 파일을 드래그</strong>하거나 클릭하세요</div>
          <div class="upload-hint">PDF · 최대 20MB</div>
          <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleFile(this.files[0])">
        </div>

        <div class="input-group">
          <div class="input-label">강의 제목 (자동 감지 후 수정 가능)</div>
          <input class="input-field" type="text" id="lectureTitle" placeholder="예: 선형대수학 3주차 — 고유값과 고유벡터">
        </div>
      </div>

      <div class="card-footer-row">
        <button class="btn btn-white" onclick="uploadAndNext()">다음 단계 →</button>
      </div>
    </div>

    <!-- STEP 2: CONCEPT REVIEW -->
    <div class="step-panel" id="panel2">
      <div class="concepts-area">
        <div class="concepts-title">Gemini가 추출한 핵심 개념 — 생성할 항목을 선택하세요</div>

        <div class="concept-list" id="conceptList">
          <!-- populated by JS -->
        </div>
      </div>

      <div class="card-footer-row">
        <button class="btn btn-ghost" onclick="goStep(1)">← 수정</button>
        <button class="btn btn-white" onclick="confirmAndGenerate()">생성 시작 →</button>
      </div>
    </div>

    <!-- STEP 3: GENERATING -->
    <div class="step-panel" id="panel3">
      <div class="generating-area">

        <div class="gen-header">
          <div class="gen-title">영상 생성 중...</div>
          <div class="gen-sub" id="genProgress"></div>
        </div>

        <div class="concept-rows" id="conceptRows"></div>

        <div class="gen-cta">
          <button class="btn-primary" id="ctaBtn" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21"/></svg>
            강의 팩 보러가기
          </button>
          <div class="cta-hint" id="ctaHint">생성이 완료되면 자동으로 활성화됩니다</div>
        </div>

      </div>
    </div>

  </div><!-- /card -->

</div><!-- /page -->

<script>
  // ── State ───────────────────────────────────────
  let packId = null;
  let jobId = null;
  let uploadedFile = null;
  let parsedConcepts = [];   // [{id, title, description, topic_id, params, checked}]
  let conceptStates = {};    // {id: 'pending'|'active'|'done'|'error'}
  let _sse = null;
  let _progressInterval = null;

  // ── Navigation ──────────────────────────────────
  function goStep(n) {
    [1,2,3].forEach(i => {
      document.getElementById('panel' + i).classList.remove('active');
      const s = document.getElementById('step' + i);
      s.classList.remove('done', 'active', 'pending');
    });
    for (let i = 1; i <= 3; i++) {
      const s = document.getElementById('step' + i);
      if (i < n) s.classList.add('done');
      else if (i === n) s.classList.add('active');
      else s.classList.add('pending');
    }
    document.querySelectorAll('.step-connector').forEach((c, idx) => {
      c.classList.toggle('done', idx + 1 < n);
    });
    document.getElementById('panel' + n).classList.add('active');
    if (n === 2) renderConcepts();
    if (n === 3) startGeneration();
  }

  // ── Step 1: file handling ────────────────────────
  function handleFile(file) {
    if (!file) return;
    if (!file.name.toLowerCase().endsWith('.pdf')) {
      alert('PDF 파일만 업로드할 수 있어요.');
      return;
    }
    uploadedFile = file;
    const label = document.querySelector('.upload-label');
    if (label) label.innerHTML = `<strong>${file.name}</strong> 선택됨`;
    const title = document.getElementById('lectureTitle');
    if (title && !title.value) {
      title.value = file.name.replace(/\.pdf$/i, '').replace(/[-_]/g, ' ');
    }
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('dropZone').classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  }

  async function uploadAndNext() {
    if (!uploadedFile) { alert('PDF 파일을 선택해주세요.'); return; }
    const btn = document.querySelector('#panel1 .btn-white');
    btn.disabled = true;
    btn.textContent = 'AI 분석 중...';
    try {
      const fd = new FormData();
      fd.append('file', uploadedFile);
      const res = await fetch('/api/create/upload', { method: 'POST', body: fd });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || '업로드 실패'); }
      const data = await res.json();
      packId = data.pack_id;
      const titleEl = document.getElementById('lectureTitle');
      if (!titleEl.value) titleEl.value = data.lecture_title || '';
      parsedConcepts = (data.concepts || []).map(c => ({ ...c, checked: true }));
      goStep(2);
    } catch (e) {
      alert(`오류: ${e.message}`);
    } finally {
      btn.disabled = false;
      btn.textContent = '다음 단계 →';
    }
  }

  // ── Step 2: concept list ─────────────────────────
  function checkSvg() {
    return `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
  }

  function renderConcepts() {
    const list = document.getElementById('conceptList');
    list.innerHTML = '';
    if (!parsedConcepts.length) {
      list.innerHTML = '<p style="color:var(--muted2);padding:16px 4px">추출된 개념이 없어요.</p>';
      return;
    }
    parsedConcepts.forEach(c => {
      const div = document.createElement('div');
      div.className = 'concept-item' + (c.checked ? ' checked' : '');
      div.onclick = () => {
        c.checked = !c.checked;
        div.classList.toggle('checked');
        div.querySelector('.concept-check').innerHTML = c.checked ? checkSvg() : '';
      };
      div.innerHTML = `
        <div class="concept-check">${c.checked ? checkSvg() : ''}</div>
        <span class="concept-name">${c.title}</span>
      `;
      list.appendChild(div);
    });
  }

  async function confirmAndGenerate() {
    const selected = parsedConcepts.filter(c => c.checked);
    if (!selected.length) { alert('최소 1개 이상의 개념을 선택해주세요.'); return; }
    const btn = document.querySelector('#panel2 .btn-white');
    btn.disabled = true;
    btn.textContent = '준비 중...';
    try {
      const title = document.getElementById('lectureTitle').value.trim() || '강의 팩';
      const res = await fetch('/api/create/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pack_id: packId, title, source_file: uploadedFile?.name || '', concepts: selected }),
      });
      if (!res.ok) throw new Error('생성 시작 실패');
      const data = await res.json();
      jobId = data.job_id;
      parsedConcepts = selected;
      parsedConcepts.forEach(c => { conceptStates[c.id] = 'pending'; });
      goStep(3);
    } catch (e) {
      alert(`오류: ${e.message}`);
      btn.disabled = false;
      btn.textContent = '생성 시작 →';
    }
  }

  // ── Step 3: SSE progress ─────────────────────────
  function startGeneration() {
    if (!jobId || _sse) return;
    rebuildRows();
    _sse = new EventSource(`/api/create/progress/${jobId}`);
    _sse.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'progress') {
        Object.keys(conceptStates).forEach(id => { if (conceptStates[id] === 'active') conceptStates[id] = 'pending'; });
        conceptStates[msg.concept_id] = 'active';
        setProgressLabel(msg.index, msg.total);
        rebuildRows();
      } else if (msg.type === 'done') {
        conceptStates[msg.concept_id] = 'done';
        const c = parsedConcepts.find(x => x.id === msg.concept_id);
        if (c) c.video_url = msg.video_url;
        setProgressLabel(msg.index, msg.total);
        rebuildRows();
      } else if (msg.type === 'error') {
        conceptStates[msg.concept_id] = 'error';
        rebuildRows();
      } else if (msg.type === 'complete') {
        _sse.close(); _sse = null;
        clearInterval(_progressInterval);
        onAllComplete();
      }
    };
    _sse.onerror = () => { if (_sse) { _sse.close(); _sse = null; } };
  }

  function setProgressLabel(index, total) {
    const el = document.getElementById('genProgress');
    if (el) el.textContent = `${total}개 중 ${index}개 완료`;
  }

  function onAllComplete() {
    const cta = document.getElementById('ctaBtn');
    const hint = document.getElementById('ctaHint');
    if (cta) {
      cta.disabled = false;
      cta.classList.add('ready');
      cta.onclick = () => { window.location.href = `/pack.html?id=${packId}`; };
    }
    if (hint) hint.textContent = '강의 팩이 완성되었습니다!';
  }

  function rebuildRows() {
    const rows = document.getElementById('conceptRows');
    if (!rows) return;
    clearInterval(_progressInterval);
    rows.innerHTML = parsedConcepts.map(c => {
      const st = conceptStates[c.id] || 'pending';
      if (st === 'done') return `
        <div class="concept-row done">
          <div class="row-icon done"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="row-name">${c.title}</div>
          <div class="row-right"><span class="badge-done">완료</span></div>
        </div>`;
      if (st === 'active') return `
        <div class="concept-row active">
          <div class="row-icon active"></div>
          <div class="row-name">${c.title}</div>
          <div class="row-right">
            <div class="row-active-content">
              <div class="status-active">생성 중...<div class="active-dots"><span></span><span></span><span></span></div></div>
              <div class="progress-track" style="width:140px"><div class="progress-fill" id="activeProgress" style="width:0%"></div></div>
            </div>
          </div>
        </div>`;
      if (st === 'error') return `
        <div class="concept-row pending">
          <div class="row-icon pending" style="border-color:rgba(255,80,80,0.4)"></div>
          <div class="row-name" style="color:var(--muted)">${c.title}</div>
          <div class="row-right"><span class="status-pending" style="color:rgba(255,80,80,0.5)">생성 실패</span></div>
        </div>`;
      return `
        <div class="concept-row pending">
          <div class="row-icon pending"></div>
          <div class="row-name">${c.title}</div>
          <div class="row-right"><span class="status-pending">대기 중</span></div>
        </div>`;
    }).join('');

    const fill = document.getElementById('activeProgress');
    if (fill) {
      let pct = 0;
      _progressInterval = setInterval(() => {
        pct = Math.min(pct + Math.random() * 2.5 + 0.5, 90);
        fill.style.width = pct.toFixed(0) + '%';
      }, 250);
    }
  }

  window.addEventListener('DOMContentLoaded', () => goStep(1));
</script>
</body>
</html>
